<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bill Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:           '#0f0f0f',
            surface:      '#1a1a1a',
            surfaceHover: '#212121',
            accent:       '#f5a623',
            accentDark:   '#d4891a',
            textPrimary:  '#f0ede8',
            textMuted:    '#7a7570',
            success:      '#4caf50',
            danger:       '#ef4444',
            border:       '#2a2a2a',
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      background: #0f0f0f;
      color: #f0ede8;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* Hide scrollbar on category tabs */
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* Custom checkbox accent */
    input[type="checkbox"] { accent-color: #f5a623; }

    /* Order panel transition */
    #order-list-container {
      transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1),
                  opacity   0.3s ease;
      overflow: hidden;
    }
    #order-list-container.collapsed { max-height: 0; opacity: 0; }
    #order-list-container.expanded  { max-height: 18rem; opacity: 1; overflow-y: auto; }

    /* Chevron spin */
    #panel-chevron { transition: transform 0.3s ease; }
    #panel-chevron.up { transform: rotate(180deg); }

    /* Qty button press */
    .qty-btn:active { transform: scale(0.88); }

    /* Input / select focus */
    .field:focus {
      border-color: #f5a623 !important;
      box-shadow: 0 0 0 2px rgba(245,166,35,0.15);
      outline: none;
    }

    /* Active category tab */
    .cat-tab          { border: 1px solid #2a2a2a; color: #7a7570; transition: all 0.15s; }
    .cat-tab.is-active { background: #f5a623; border-color: #f5a623; color: #0f0f0f; }

    /* Modal scroll on short screens */
    #modal-inner { max-height: 90dvh; overflow-y: auto; }

    /* Grain texture overlay (decorative) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.018;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body class="min-h-screen">

<!-- ============================================================
     BILLING VIEW
============================================================ -->
<div id="billing-view">

  <!-- Header -->
  <header class="sticky top-0 z-30 bg-bg/95 backdrop-blur-sm border-b border-border px-4 py-3 flex items-center justify-between">
    <div>
      <p class="text-[10px] uppercase tracking-widest font-semibold text-textMuted leading-none mb-0.5">Bill Calculator</p>
      <!-- Change restaurant name below -->
      <h1 class="text-[17px] font-extrabold text-textPrimary leading-tight tracking-tight">THE GRAND</h1>
    </div>
    <button
      onclick="showAdminLogin()"
      class="text-[11px] font-semibold text-textMuted border border-border rounded-lg px-3 py-1.5 hover:border-accent hover:text-accent transition-colors active:scale-95"
    >Admin</button>
  </header>

  <!-- Search bar -->
  <div class="sticky top-[57px] z-20 bg-bg/95 backdrop-blur-sm px-3 py-2 border-b border-border">
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-textMuted pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input
        id="search-input"
        type="text"
        placeholder="Search menu..."
        autocomplete="off"
        class="field w-full bg-surface border border-border rounded-xl pl-9 pr-9 py-2.5 text-sm text-textPrimary placeholder-textMuted"
        oninput="onSearch(this.value)"
      />
      <button
        id="search-clear"
        onclick="clearSearch()"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-textMuted hidden"
        aria-label="Clear search"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Category tabs -->
  <div class="sticky top-[113px] z-10 bg-bg/95 backdrop-blur-sm border-b border-border">
    <div id="category-tabs" class="flex gap-2 px-3 py-2 overflow-x-auto no-scrollbar">
      <span class="text-xs text-textMuted px-1 py-1 self-center" id="cats-loading">Loading...</span>
    </div>
  </div>

  <!-- Menu grid -->
  <div id="menu-grid" class="grid grid-cols-2 gap-3 px-3 pt-3 pb-40">
    <!-- Populated by JS -->
  </div>

  <!-- No results state -->
  <div id="no-results" class="hidden px-4 py-16 text-center">
    <p class="text-textMuted text-sm">No items match "<span id="no-results-term" class="text-textPrimary"></span>"</p>
    <button onclick="clearSearch()" class="mt-3 text-accent text-xs underline underline-offset-2">Clear search</button>
  </div>

  <!-- Loading skeleton -->
  <div id="menu-loading" class="px-3 pt-3 pb-40 grid grid-cols-2 gap-3">
    <div class="h-28 bg-surface rounded-2xl animate-pulse"></div>
    <div class="h-28 bg-surface rounded-2xl animate-pulse"></div>
    <div class="h-28 bg-surface rounded-2xl animate-pulse"></div>
    <div class="h-28 bg-surface rounded-2xl animate-pulse"></div>
    <div class="h-28 bg-surface rounded-2xl animate-pulse"></div>
    <div class="h-28 bg-surface rounded-2xl animate-pulse"></div>
  </div>

  <!-- Fixed bottom order panel -->
  <div class="fixed bottom-0 left-0 right-0 z-40 bg-surface border-t border-border shadow-2xl shadow-black/60">

    <!-- Toggle bar -->
    <button
      onclick="toggleOrderPanel()"
      class="w-full flex items-center justify-between px-4 py-3 active:bg-surfaceHover transition-colors"
    >
      <div class="flex items-center gap-2.5">
        <span class="text-sm font-bold text-textPrimary">Order Summary</span>
        <span id="cart-badge" class="hidden bg-accent text-bg text-[10px] font-extrabold min-w-[18px] px-1.5 py-0.5 rounded-full text-center leading-none"></span>
      </div>
      <div class="flex items-center gap-3">
        <span id="cart-total-bar" class="text-accent font-extrabold text-base">₹0</span>
        <svg id="panel-chevron" class="w-4 h-4 text-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"/>
        </svg>
      </div>
    </button>

    <!-- Expanded list -->
    <div id="order-list-container" class="collapsed border-t border-border">
      <div id="order-list" class="px-4 pt-2 pb-1"></div>
      <div class="px-4 pb-3">
        <button
          onclick="clearOrder()"
          class="w-full mt-2 bg-danger/10 border border-danger/30 text-danger text-sm font-semibold rounded-xl py-2.5 active:scale-[0.97] transition-transform"
        >Clear Order</button>
      </div>
    </div>

  </div>
</div><!-- /billing-view -->


<!-- ============================================================
     ADMIN VIEW  (hidden by default)
============================================================ -->
<div id="admin-view" class="hidden min-h-screen">

  <!-- Login screen -->
  <div id="admin-login-screen" class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-sm">
      <div class="mb-8 text-center">
        <p class="text-[10px] uppercase tracking-widest font-semibold text-accent mb-2">Admin Access</p>
        <h2 class="text-2xl font-extrabold text-textPrimary">Sign In</h2>
      </div>
      <div class="space-y-3">
        <input
          id="admin-email"
          type="email"
          placeholder="Email address"
          autocomplete="email"
          class="field w-full bg-surface border border-border rounded-xl px-4 py-3 text-sm text-textPrimary placeholder-textMuted"
        />
        <input
          id="admin-password"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
          class="field w-full bg-surface border border-border rounded-xl px-4 py-3 text-sm text-textPrimary placeholder-textMuted"
          onkeydown="if(event.key==='Enter') adminLogin()"
        />
        <p id="login-error" class="hidden text-danger text-xs px-1 pt-0.5"></p>
        <button
          id="login-btn"
          onclick="adminLogin()"
          class="w-full bg-accent text-bg text-sm font-bold rounded-xl py-3 active:scale-[0.97] transition-transform mt-1"
        >Sign In</button>
        <button onclick="showBilling()" class="w-full text-textMuted text-sm py-2 hover:text-textPrimary transition-colors">
          Back to Billing
        </button>
      </div>
    </div>
  </div>

  <!-- Dashboard (shown after login) -->
  <div id="admin-dashboard" class="hidden">

    <!-- Admin header -->
    <header class="sticky top-0 z-30 bg-bg/95 backdrop-blur-sm border-b border-border px-4 py-3 flex items-center justify-between">
      <h2 class="text-base font-extrabold text-textPrimary">Menu Manager</h2>
      <div class="flex items-center gap-2">
        <button
          onclick="openAddModal()"
          class="bg-accent text-bg text-xs font-bold px-3 py-1.5 rounded-lg active:scale-95 transition-transform"
        >+ Add Item</button>
        <button
          onclick="adminLogout()"
          class="text-xs text-textMuted border border-border rounded-lg px-3 py-1.5 hover:border-danger hover:text-danger transition-colors"
        >Logout</button>
      </div>
    </header>

    <!-- Back to billing link -->
    <div class="px-4 pt-3 pb-1">
      <button onclick="showBilling()" class="text-xs text-textMuted hover:text-accent transition-colors">
        ← Back to billing
      </button>
    </div>

    <!-- Item list -->
    <div id="admin-menu-list" class="px-3 pt-2 pb-10 space-y-2">
      <!-- Populated by JS -->
    </div>

  </div>
</div><!-- /admin-view -->


<!-- ============================================================
     ADD / EDIT MODAL
============================================================ -->
<div
  id="modal-backdrop"
  class="hidden fixed inset-0 bg-black/75 z-50 items-end sm:items-center justify-center"
  onclick="onBackdropClick(event)"
>
  <div id="modal-inner" class="bg-surface border border-border rounded-t-3xl sm:rounded-2xl w-full sm:max-w-sm p-5 pt-4">

    <!-- Drag handle (mobile) -->
    <div class="flex justify-center mb-4 sm:hidden">
      <div class="w-10 h-1 bg-border rounded-full"></div>
    </div>

    <h3 id="modal-title" class="text-base font-bold text-textPrimary mb-4">Add Menu Item</h3>

    <div class="space-y-3">
      <input type="hidden" id="modal-doc-id" />

      <input
        id="modal-name"
        type="text"
        placeholder="Item name"
        class="field w-full bg-bg border border-border rounded-xl px-4 py-2.5 text-sm text-textPrimary placeholder-textMuted"
      />

      <!-- Category: existing + custom option -->
      <select
        id="modal-category"
        class="field w-full bg-bg border border-border rounded-xl px-4 py-2.5 text-sm text-textPrimary"
      >
        <option value="">Select category</option>
        <option value="Chicken">Chicken</option>
        <option value="Beef">Beef</option>
        <option value="Mutton">Mutton</option>
        <option value="Egg">Egg</option>
        <option value="Seafood">Seafood</option>
        <option value="Veg">Veg</option>
        <option value="Biryani">Biryani</option>
        <option value="Drinks">Drinks</option>
        <option value="Other">Other</option>
      </select>

      <input
        id="modal-price"
        type="number"

      />

      <div class="flex items-center justify-between bg-bg border border-border rounded-xl px-4 py-2.5">

          <input
            id="modal-has-boneless"
            type="checkbox"
            class="sr-only peer"
            onchange="onBonelessToggle()"
          />
          <div class="w-10 h-5 bg-border peer-checked:bg-accent rounded-full transition-colors duration-200"></div>
          <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200 peer-checked:translate-x-5"></div>
        </label>
      </div>

      <input
        id="modal-boneless-price"
        type="number"
        min="1"
        placeholder="Boneless price (₹)"

      />

      <p id="modal-error" class="hidden text-danger text-xs px-1"></p>

      <div class="flex gap-2 pt-1">
        <button
          onclick="closeModal()"
          class="flex-1 bg-bg border border-border text-textMuted text-sm font-semibold rounded-xl py-2.5 active:scale-95 transition-transform"
        >Cancel</button>
        <button
          onclick="saveItem()"
          class="flex-1 bg-accent text-bg text-sm font-bold rounded-xl py-2.5 active:scale-95 transition-transform"
        >Save</button>
      </div>
    </div>

  </div>
</div><!-- /modal -->


<!-- ============================================================
     FIREBASE + APP LOGIC
============================================================ -->
<script type="module">
import { initializeApp }                              from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getFirestore, collection, doc,
         onSnapshot, addDoc, updateDoc, deleteDoc }   from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword,
         signOut, onAuthStateChanged }                from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

// ------------------------------------------------------------------
// FIREBASE CONFIG  — replace with your project's config
// ------------------------------------------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyCJQAQFum8P7Fzwp63G9z4qdalsDw6UOi8",
  authDomain: "kairasirestaurent.firebaseapp.com",
  projectId: "kairasirestaurent",
  storageBucket: "kairasirestaurent.firebasestorage.app",
  messagingSenderId: "415340439424",
  appId: "1:415340439424:web:2687e1b358bd6195540365"
};
const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

// ------------------------------------------------------------------
// STATE
// ------------------------------------------------------------------
const state = {
  menuItems:            [],        // { id, name, category, price, hasBoneless, bonelessPrice }
  cart:                 {},        // { [docId]: { qty: number, boneless: boolean } }
  activeCategory:       'All',
  searchQuery:          '',
  orderPanelExpanded:   false,
  menuLoaded:           false,
};

// ------------------------------------------------------------------
// FIRESTORE LIVE LISTENER
// ------------------------------------------------------------------
onSnapshot(
  collection(db, 'menu'),
  (snap) => {
    state.menuItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Drop cart entries whose menu item was deleted
    for (const id of Object.keys(state.cart)) {
      if (!state.menuItems.find(m => m.id === id)) delete state.cart[id];
    }

    state.menuLoaded = true;
    document.getElementById('menu-loading').classList.add('hidden');
    document.getElementById('menu-grid').classList.remove('hidden');

    renderCategories();
    renderMenu();
    renderCart();
    renderAdminList();
  },
  (err) => {
    console.error('Firestore:', err);
    document.getElementById('menu-loading').innerHTML =
      '<p class="col-span-2 text-center text-danger text-sm py-10">Failed to load menu. Check Firebase config.</p>';
  }
);

// ------------------------------------------------------------------
// AUTH STATE
// ------------------------------------------------------------------
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('admin-login-screen').classList.add('hidden');
    document.getElementById('admin-dashboard').classList.remove('hidden');
    renderAdminList();
  } else {
    document.getElementById('admin-login-screen').classList.remove('hidden');
    document.getElementById('admin-dashboard').classList.add('hidden');
  }
});

// ------------------------------------------------------------------
// COMPUTED
// ------------------------------------------------------------------
function filteredItems() {
  return state.menuItems.filter(item => {
    const catMatch  = state.activeCategory === 'All' || item.category === state.activeCategory;
    const nameMatch = !state.searchQuery ||
      item.name.toLowerCase().includes(state.searchQuery.toLowerCase());
    return catMatch && nameMatch;
  });
}

function effectivePrice(item, boneless) {
  return (boneless && item.hasBoneless && item.bonelessPrice) ? item.bonelessPrice : item.price;
}

function cartTotal() {
  return Object.entries(state.cart).reduce((sum, [id, entry]) => {
    const item = state.menuItems.find(m => m.id === id);
    return item ? sum + effectivePrice(item, entry.boneless) * entry.qty : sum;
  }, 0);
}

function cartItemCount() {
  return Object.values(state.cart).reduce((s, e) => s + e.qty, 0);
}

// ------------------------------------------------------------------
// RENDER: CATEGORY TABS
// ------------------------------------------------------------------
function renderCategories() {
  const cats = ['All', ...new Set(
    state.menuItems.map(i => i.category).filter(Boolean).sort()
  )];

  document.getElementById('category-tabs').innerHTML = cats.map(cat => `
    <button
      class="cat-tab flex-shrink-0 text-[11px] font-semibold uppercase tracking-wider px-4 py-1.5 rounded-full ${cat === state.activeCategory ? 'is-active' : ''}"
      onclick="window.__setCategory('${esc(cat)}')"
    >${esc(cat)}</button>
  `).join('');

  document.getElementById('cats-loading')?.remove();
}

// ------------------------------------------------------------------
// RENDER: MENU GRID
// ------------------------------------------------------------------
function renderMenu() {
  if (!state.menuLoaded) return;

  const items    = filteredItems();
  const grid     = document.getElementById('menu-grid');
  const noRes    = document.getElementById('no-results');

  if (items.length === 0) {
    grid.innerHTML = '';
    noRes.classList.remove('hidden');
    document.getElementById('no-results-term').textContent =
      state.searchQuery || state.activeCategory;
    return;
  }

  noRes.classList.add('hidden');

  grid.innerHTML = items.map(item => {
    const entry   = state.cart[item.id];
    const qty     = entry?.qty ?? 0;
    const boneless = entry?.boneless ?? false;
    const price   = effectivePrice(item, boneless);
    const priceDiff = item.hasBoneless && item.bonelessPrice
      ? item.bonelessPrice - item.price : 0;

    return `
      <div class="bg-surface border border-border rounded-2xl p-3 flex flex-col gap-2.5">

        <div class="flex items-start justify-between gap-1 min-h-0">
          <div class="flex-1 min-w-0">
            <p class="text-[10px] font-semibold uppercase tracking-wider text-accent leading-none mb-1">${esc(item.category)}</p>
            <p class="text-[13px] font-bold text-textPrimary leading-snug line-clamp-2">${esc(item.name)}</p>
          </div>
          <p class="text-[13px] font-extrabold text-textPrimary whitespace-nowrap ml-1 mt-0.5">₹${price}</p>
        </div>

        ${item.hasBoneless ? `
          <label class="flex items-center gap-1.5 cursor-pointer select-none">
            <input
              type="checkbox"
              ${boneless ? 'checked' : ''}
              onchange="window.__toggleBoneless('${item.id}', this.checked)"
              class="w-3.5 h-3.5 cursor-pointer flex-shrink-0"
            />
            <span class="text-[11px] text-textMuted">
              Boneless
              ${priceDiff > 0 ? `<span class="text-accent font-semibold">+₹${priceDiff}</span>` : ''}
            </span>
          </label>
        ` : ''}

        <div class="mt-auto">
          ${qty === 0 ? `
            <button
              onclick="window.__addItem('${item.id}')"
              class="qty-btn w-full bg-accent/10 border border-accent/25 text-accent text-xs font-bold rounded-xl py-1.5 transition-transform"
            >+ Add</button>
          ` : `
            <div class="flex items-center justify-between">
              <button
                onclick="window.__removeItem('${item.id}')"
                class="qty-btn w-8 h-8 bg-bg border border-border rounded-xl flex items-center justify-center text-textPrimary font-bold text-lg leading-none transition-transform"
              >−</button>
              <span class="text-base font-extrabold text-textPrimary tabular-nums">${qty}</span>
              <button
                onclick="window.__addItem('${item.id}')"
                class="qty-btn w-8 h-8 bg-accent rounded-xl flex items-center justify-center text-bg font-bold text-lg leading-none transition-transform"
              >+</button>
            </div>
          `}
        </div>

      </div>
    `;
  }).join('');
}

// ------------------------------------------------------------------
// RENDER: CART / ORDER PANEL
// ------------------------------------------------------------------
function renderCart() {
  const total  = cartTotal();
  const count  = cartItemCount();
  const badge  = document.getElementById('cart-badge');
  const bar    = document.getElementById('cart-total-bar');

  bar.textContent = `₹${total}`;

  if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
  else           { badge.classList.add('hidden'); }

  const entries = Object.entries(state.cart).filter(([, e]) => e.qty > 0);
  const list    = document.getElementById('order-list');

  if (entries.length === 0) {
    list.innerHTML = '<p class="text-textMuted text-xs py-2 pb-3">No items added yet.</p>';
    return;
  }

  const rows = entries.map(([id, entry]) => {
    const item = state.menuItems.find(m => m.id === id);
    if (!item) return '';
    const p  = effectivePrice(item, entry.boneless);
    const st = p * entry.qty;
    return `
      <div class="flex items-center justify-between py-2 border-b border-border/40 last:border-0">
        <div class="flex-1 min-w-0 pr-2">
          <p class="text-[12px] font-semibold text-textPrimary truncate">
            ${esc(item.name)}${entry.boneless ? ' <span class="text-accent text-[10px]">(BL)</span>' : ''}
          </p>
          <p class="text-[11px] text-textMuted">₹${p} × ${entry.qty}</p>
        </div>
        <p class="text-[13px] font-bold text-success whitespace-nowrap">₹${st}</p>
      </div>
    `;
  }).join('');

  const totalRow = `
    <div class="flex items-center justify-between pt-2.5 pb-1">
      <p class="text-sm font-bold text-textPrimary">Grand Total</p>
      <p class="text-base font-extrabold text-success">₹${total}</p>
    </div>
  `;

  list.innerHTML = rows + totalRow;
}

// ------------------------------------------------------------------
// RENDER: ADMIN LIST
// ------------------------------------------------------------------
function renderAdminList() {
  const el = document.getElementById('admin-menu-list');
  if (!el) return;

  if (!state.menuLoaded) { el.innerHTML = '<p class="text-textMuted text-sm px-1 py-4">Loading...</p>'; return; }
  if (state.menuItems.length === 0) {
    el.innerHTML = '<p class="text-textMuted text-sm px-1 py-4">No items yet.</p>';
    return;
  }

  const sorted = [...state.menuItems].sort(
    (a, b) => (a.category ?? '').localeCompare(b.category ?? '') || (a.name ?? '').localeCompare(b.name ?? '')
  );

  el.innerHTML = sorted.map(item => `
    <div class="bg-surface border border-border rounded-xl p-3 flex items-start justify-between gap-3">
      <div class="flex-1 min-w-0">
        <p class="text-[10px] uppercase tracking-wider font-semibold text-accent mb-0.5">${esc(item.category)}</p>
        <p class="text-[13px] font-bold text-textPrimary leading-snug">${esc(item.name)}</p>
        <p class="text-[11px] text-textMuted mt-0.5">
          ₹${item.price}${item.hasBoneless ? ` &nbsp;·&nbsp; Boneless ₹${item.bonelessPrice}` : ''}
        </p>
      </div>
      <div class="flex gap-2 flex-shrink-0 pt-0.5">
        <button
          onclick="window.__openEditModal('${item.id}')"
          class="text-[11px] font-semibold border border-border text-textMuted rounded-lg px-2.5 py-1.5 active:scale-95 transition-transform"
        >Edit</button>
        <button
          onclick="window.__deleteItem('${item.id}')"
          class="text-[11px] font-semibold border border-danger/30 text-danger rounded-lg px-2.5 py-1.5 active:scale-95 transition-transform"
        >Del</button>
      </div>
    </div>
  `).join('');
}

// ------------------------------------------------------------------
// CART ACTIONS
// ------------------------------------------------------------------
window.__addItem = (id) => {
  if (!state.cart[id]) state.cart[id] = { qty: 0, boneless: false };
  state.cart[id].qty++;
  renderMenu();
  renderCart();
};

window.__removeItem = (id) => {
  if (!state.cart[id]) return;
  state.cart[id].qty = Math.max(0, state.cart[id].qty - 1);
  if (state.cart[id].qty === 0) delete state.cart[id];
  renderMenu();
  renderCart();
};

window.__toggleBoneless = (id, checked) => {
  if (!state.cart[id]) state.cart[id] = { qty: 1, boneless: checked };
  else                 state.cart[id].boneless = checked;
  if (state.cart[id].qty < 1) state.cart[id].qty = 1;
  renderMenu();
  renderCart();
};

window.clearOrder = () => {
  state.cart = {};
  renderMenu();
  renderCart();
};

// ------------------------------------------------------------------
// NAVIGATION
// ------------------------------------------------------------------
window.__setCategory = (cat) => {
  state.activeCategory = cat;
  renderCategories();
  renderMenu();
};

window.onSearch = (val) => {
  state.searchQuery = val.trim();
  document.getElementById('search-clear').classList.toggle('hidden', !val);
  renderMenu();
};

window.clearSearch = () => {
  state.searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.add('hidden');
  renderMenu();
};

window.toggleOrderPanel = () => {
  state.orderPanelExpanded = !state.orderPanelExpanded;
  const el      = document.getElementById('order-list-container');
  const chevron = document.getElementById('panel-chevron');
  if (state.orderPanelExpanded) {
    el.classList.replace('collapsed', 'expanded');
    chevron.classList.add('up');
  } else {
    el.classList.replace('expanded', 'collapsed');
    chevron.classList.remove('up');
  }
};

window.showAdminLogin = () => {
  document.getElementById('billing-view').classList.add('hidden');
  document.getElementById('admin-view').classList.remove('hidden');
};

window.showBilling = () => {
  document.getElementById('admin-view').classList.add('hidden');
  document.getElementById('billing-view').classList.remove('hidden');
};

// ------------------------------------------------------------------
// AUTH
// ------------------------------------------------------------------
window.adminLogin = async () => {
  const email    = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');

  if (!email || !password) {
    errEl.textContent = 'Email and password are required.';
    errEl.classList.remove('hidden');
    return;
  }

  btn.textContent = 'Signing in...';
  btn.disabled    = true;
  errEl.classList.add('hidden');

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    const msg = err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password'
      ? 'Invalid email or password.'
      : err.message;
    errEl.textContent = msg;
    errEl.classList.remove('hidden');
  } finally {
    btn.textContent = 'Sign In';
    btn.disabled    = false;
  }
};

window.adminLogout = async () => {
  await signOut(auth);
};

// ------------------------------------------------------------------
// MODAL
// ------------------------------------------------------------------
window.openAddModal = () => {
  document.getElementById('modal-title').textContent       = 'Add Menu Item';
  document.getElementById('modal-doc-id').value           = '';
  document.getElementById('modal-name').value             = '';
  document.getElementById('modal-category').value         = '';
  document.getElementById('modal-price').value            = '';
  document.getElementById('modal-has-boneless').checked   = false;
  document.getElementById('modal-boneless-price').value   = '';
  document.getElementById('modal-boneless-price').classList.add('hidden');
  document.getElementById('modal-error').classList.add('hidden');
  showModal();
};

window.__openEditModal = (id) => {
  const item = state.menuItems.find(m => m.id === id);
  if (!item) return;

  document.getElementById('modal-title').textContent       = 'Edit Item';
  document.getElementById('modal-doc-id').value           = id;
  document.getElementById('modal-name').value             = item.name        ?? '';
  document.getElementById('modal-category').value         = item.category    ?? '';
  document.getElementById('modal-price').value            = item.price       ?? '';
  document.getElementById('modal-has-boneless').checked   = !!item.hasBoneless;
  document.getElementById('modal-boneless-price').value   = item.bonelessPrice ?? '';
  document.getElementById('modal-boneless-price').classList.toggle('hidden', !item.hasBoneless);
  document.getElementById('modal-error').classList.add('hidden');
  showModal();
};

window.closeModal = () => {
  const bd = document.getElementById('modal-backdrop');
  bd.classList.add('hidden');
  bd.classList.remove('flex');
};

window.onBackdropClick = (e) => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
};

window.onBonelessToggle = () => {
  const show = document.getElementById('modal-has-boneless').checked;
  document.getElementById('modal-boneless-price').classList.toggle('hidden', !show);
};

function showModal() {
  const bd = document.getElementById('modal-backdrop');
  bd.classList.remove('hidden');
  bd.classList.add('flex');
  setTimeout(() => document.getElementById('modal-name').focus(), 50);
}

window.saveItem = async () => {
  const docId        = document.getElementById('modal-doc-id').value;
  const name         = document.getElementById('modal-name').value.trim();
  const category     = document.getElementById('modal-category').value;
  const priceRaw     = document.getElementById('modal-price').value;
  const hasBoneless  = document.getElementById('modal-has-boneless').checked;
  const bonelessRaw  = document.getElementById('modal-boneless-price').value;
  const errEl        = document.getElementById('modal-error');

  const price        = parseFloat(priceRaw);
  const bonelessPrice = hasBoneless ? parseFloat(bonelessRaw) : null;

  if (!name) {
    errEl.textContent = 'Item name is required.'; errEl.classList.remove('hidden'); return;
  }
  if (!category) {
    errEl.textContent = 'Category is required.'; errEl.classList.remove('hidden'); return;
  }
  if (isNaN(price) || price <= 0) {
    errEl.textContent = 'Enter a valid base price.'; errEl.classList.remove('hidden'); return;
  }
  if (hasBoneless && (isNaN(bonelessPrice) || bonelessPrice <= 0)) {
    errEl.textContent = 'Enter a valid boneless price.'; errEl.classList.remove('hidden'); return;
  }
  if (hasBoneless && bonelessPrice <= price) {
    errEl.textContent = 'Boneless price must be higher than base price.'; errEl.classList.remove('hidden'); return;
  }

  errEl.classList.add('hidden');

  const data = { name, category, price, hasBoneless };
  if (hasBoneless) data.bonelessPrice = bonelessPrice;

  try {
    if (docId) {
      await updateDoc(doc(db, 'menu', docId), data);
    } else {
      await addDoc(collection(db, 'menu'), data);
    }
    closeModal();
  } catch (err) {
    errEl.textContent = `Save failed: ${err.message}`;
    errEl.classList.remove('hidden');
  }
};

window.__deleteItem = async (id) => {
  if (!confirm('Delete this item from the menu?')) return;
  try {
    await deleteDoc(doc(db, 'menu', id));
  } catch (err) {
    alert(`Delete failed: ${err.message}`);
  }
};

// ------------------------------------------------------------------
// UTILITY
// ------------------------------------------------------------------
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

</script>
</body>
